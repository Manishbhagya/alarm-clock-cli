name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install linters
        run: pip install ruff>=0.5 mypy>=1.0
      - name: Check with ruff
        run: python -m ruff check src/
      - name: Check formatting with ruff
        run: python -m ruff format --check src/
      - name: Type check with mypy
        run: python -m mypy src/alarm_clock/ --ignore-missing-imports

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.python-version }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev,test]"
      - name: Run tests
        run: python -m pytest --cov=alarm_clock --cov-report=term-missing --cov-report=xml -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build (${{ matrix.os }})
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]" pyinstaller
      - name: Build executable
        run: pyinstaller --clean packaging/alarm-clock.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-clock-${{ matrix.os }}
          path: dist/alarm-clock*

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: alarm-clock-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            alarm-clock-ubuntu-latest/*
            alarm-clock-macos-latest/*
            alarm-clock-windows-latest/*
          generate_release_notes: true
